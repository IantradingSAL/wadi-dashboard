<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>بلدية وادي الست — نظام متابعة الطلبات</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--blue:#1a6eb5;--blue2:#0f4d82;--blue3:#daeaf8;--green:#2d7a3e;--green2:#1e5429;--green3:#d4edda;
--text:#1a1a2e;--text2:#444;--text3:#888;--border:#e0e6ef;--bg:#f5f7fa;--font:'Tahoma',Arial,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);direction:rtl;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}
.top-bar{background:linear-gradient(120deg,var(--blue2),var(--blue) 60%,var(--green2));color:#fff;padding:14px 24px;display:flex;align-items:center;gap:14px;}
.top-bar img{height:44px;}
.top-bar-text h1{font-size:17px;font-weight:800;}
.top-bar-text p{font-size:11px;opacity:.7;}
.main{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:20px 16px;}
.container{max-width:480px;width:100%;text-align:center;padding:0 8px;}
.logo-wrap{margin-bottom:18px;}
.logo-wrap img{height:80px;}
.title{font-size:24px;font-weight:900;color:var(--blue2);margin-bottom:4px;}
.subtitle{font-size:13px;color:var(--text3);margin-bottom:20px;}
.divider{width:70px;height:3px;background:linear-gradient(90deg,var(--blue),var(--green2));border-radius:4px;margin:0 auto 20px;}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.card{background:#fff;border-radius:16px;padding:22px 16px;cursor:pointer;transition:all .15s;text-align:center;}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1);}
.card.citizen{border:2px solid var(--blue);}
.card.citizen:hover{background:var(--blue3);}
.card.staff{border:2px solid var(--green2);}
.card.staff:hover{background:var(--green3);}
.card-icon{font-size:34px;margin-bottom:8px;}
.card-title{font-size:15px;font-weight:800;margin-bottom:3px;}
.card-title.blue{color:var(--blue2);}
.card-title.green{color:var(--green2);}
.card-desc{font-size:12px;color:var(--text3);}
.water-card{background:#fff;border:2px solid var(--green2);border-radius:14px;padding:14px 18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.water-card:hover{background:var(--green3);}
.water-card-badge{margin-right:auto;font-size:11px;background:var(--green3);color:var(--green2);padding:3px 10px;border-radius:20px;font-weight:700;}
.wn-btn{background:transparent;border:1.5px solid var(--blue);color:var(--blue);border-radius:20px;padding:10px 28px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:8px;transition:all .2s;}
.wn-btn:hover{background:var(--blue3);}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:20px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;direction:rtl;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff;border-radius:20px 20px 0 0;}
.modal-hdr h2{font-size:18px;font-weight:800;color:#1a1a2e;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#999;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:#f0f0f0;}
.modal-body{padding:16px 20px;}
</style>
</head>

function openWnModal() {
  var body = document.getElementById('wn-modal-body');
  body.innerHTML = WN_VERSIONS.map(function(v){
    return '<div style="background:'+v.color+';border-radius:14px;padding:14px 16px;margin-bottom:16px">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
      +'<div><div style="font-size:16px;font-weight:800;color:#1a1a2e">الإصدار '+v.version+'</div>'
      +'<div style="font-size:12px;color:#888;margin-top:2px">'+v.date+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span style="background:'+v.badgeColor+';color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px">'+v.features.length+' ميزة</span>'
      +'<span style="font-size:26px">🚀</span></div></div>'
      +'<div style="background:#fff;border-radius:10px;overflow:hidden">'
      +v.features.map(function(f,i){
        return '<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px'+(i<v.features.length-1?';border-bottom:1px solid #f0f0f0':'')+'">'
          +'<div style="flex:1"><div style="font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:3px">'+f.title+'</div>'
          +'<div style="font-size:12px;color:#666;line-height:1.6">'+f.desc+'</div></div>'
          +'<div style="width:38px;height:38px;border-radius:10px;background:#f8f8f8;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">'+f.icon+'</div>'
          +'</div>';
      }).join('')+'</div></div>';
  }).join('');
  document.getElementById('wn-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeWnModal() {
  document.getElementById('wn-modal').classList.remove('open');
  document.body.style.overflow = '';
}
</script>
