<style>
:root{--blue:#1a6eb5;--blue2:#0f4d82;--blue3:#daeaf8;--green:#2d7a3e;--green2:#1e5429;--green3:#d4edda;
--danger:#e74c3c;--warn:#e67e22;--text:#1a1a2e;--text2:#444;--text3:#888;--border:#e0e6ef;
--bg:#f5f7fa;--bg2:#f0f2f7;--surface2:#e8eef8;--font:'Tahoma',Arial,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);direction:rtl;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;color:var(--text);font-size:14px;}
.header{background:linear-gradient(120deg,var(--blue2),var(--blue) 60%,var(--green2));color:#fff;padding:14px 22px;display:flex;align-items:center;gap:12px;}
.header img{height:38px;}
.header-text h1{font-size:16px;font-weight:800;}
.header-text p{font-size:11px;opacity:.7;}
.back-btn{margin-right:auto;background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-family:var(--font);}
.main{flex:1;padding:20px 16px;max-width:600px;margin:0 auto;width:100%;}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.fi{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:14px;outline:none;background:#fff;color:var(--text);direction:rtl;}
.fi:focus{border-color:var(--blue);}
.fg{margin-bottom:12px;}
.fl{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--text2);font-family:var(--font);transition:all .15s;width:100%;justify-content:center;}
.btn.bp{background:var(--blue);color:#fff;border-color:var(--blue);}
.section-title{font-size:16px;font-weight:800;color:var(--blue2);margin-bottom:16px;text-align:center;}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;}
.tab{padding:10px 18px;font-size:14px;font-weight:700;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.on{color:var(--blue);border-color:var(--blue);}
</style>
</head>

function addCitFiles(files){
  Array.from(files).forEach(function(f){citFiles.push(f);});
  renderCitFiles();
}
function renderCitFiles(){
  var el=document.getElementById('c-files-list'); if(!el) return;
  el.innerHTML=citFiles.map(function(f,i){return '<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg2);border-radius:8px"><span style="flex:1;font-size:12px">📄 '+f.name+'</span><button onclick="citFiles.splice('+i+',1);renderCitFiles()" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:16px">×</button></div>';}).join('');
}

function getDbType(catId){
  var valid=['complaint','welfare','permit','inquiry','ifada'];
  if(valid.includes(catId)) return catId;
  var cat=getCats().find(function(c){return c.id===catId;});
  if(!cat) return 'complaint';
  var l=(cat.label||'').toLowerCase();
  if(l.includes('شكو')) return 'complaint';
  if(l.includes('رعاي')) return 'welfare';
  if(l.includes('رخص')) return 'permit';
  if(l.includes('استفس')) return 'inquiry';
  if(l.includes('إفاد')||l.includes('افاد')) return 'ifada';
  return 'complaint';
}

  if(!dbR){err.textContent='⚠️ الخدمة غير متاحة';return;}

    municipality_id:MUN_ID,

    timeline:[{a:'تم تقديم الطلب عبر الموقع',by:name,d:today,cls:''}],
    documents:[],source:'website'};
  try{
    var {data,error}=await sb.from('cases').insert([nc]).select().single();
    if(error) throw error;
    var caseId=data.id;
    document.getElementById('submit-form-wrap').style.display='none';
    document.getElementById('c-success').style.display='block';
    document.getElementById('c-success').innerHTML='<div class="card" style="text-align:center"><div style="font-size:52px;margin-bottom:14px">🎉</div>'
      +'<div style="font-size:20px;font-weight:800;color:var(--green2);margin-bottom:8px">تم استلام طلبك!</div>'
      +'<div style="font-size:14px;color:var(--text2);margin-bottom:14px">رقمك المرجعي:</div>'
      +'<div style="font-size:28px;font-weight:800;color:var(--blue2);background:var(--blue3);padding:12px 24px;border-radius:10px;display:inline-block;margin-bottom:16px">#'+caseId+'</div>'
      +'<div style="font-size:13px;color:var(--text3);margin-bottom:16px">احتفظ بهذا الرقم لمتابعة طلبك</div>'
      +'<button class="btn bp" onclick="location.reload()">📋 تقديم طلب جديد</button></div>';
    if(email) setTimeout(function(){
      sendBrevoEmail(email, name, '[بلدية وادي الست] تم استلام طلبكم #'+caseId,
        buildCitizenEmailHtml(caseId,name,typeRaw,na?'pending-approval':'new'));
    },200);
    // Upload files
    if(citFiles.length){
      for(var i=0;i<citFiles.length;i++){
        var f=citFiles[i];
        var ext=f.name.split('.').pop().toLowerCase();
        var path=caseId+'/'+Date.now()+'_'+i+'.'+ext;
        await sb.storage.from('case-documents').upload(path,f,{upsert:true});
      }
    }
  }catch(e){err.textContent='خطأ: '+e.message;btn.disabled=false;btn.textContent='📤 إرسال الطلب';}

    +'<textarea id="cit-update-note" placeholder="اكتب ملاحظة أو معلومة إضافية…" class="fi" rows="3" style="margin-bottom:8px;resize:none"></textarea>'
    +'<label style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg2);border:1.5px dashed var(--blue);border-radius:10px;cursor:pointer;font-size:13px;color:var(--blue);margin-bottom:8px"><input type="file" id="cit-update-files" multiple style="display:none" onchange="showCitUpdateFiles(this)">📂 إرفاق مستندات إضافية</label>'
    +'<div id="cit-update-file-list" style="font-size:12px;color:var(--text3);margin-bottom:8px"></div>'
    +'<button class="btn bp" onclick="submitCitUpdate(\'' + "' + data.id + '" + '\',\'' + "' + (data.phone||'') + '" + '\')">✅ إرسال التحديث</button>'
    +'<div id="cit-update-msg" style="margin-top:8px;font-size:13px;text-align:center;min-height:18px"></div>'
    +'</div></div>';
  el.innerHTML=h;
}

function showCitUpdateFiles(input){
  var list=document.getElementById('cit-update-file-list');if(!list||!input.files.length)return;
  list.innerHTML=Array.from(input.files).map(function(f){return '<div style="padding:3px 0">📄 '+f.name+' ('+( f.size/1024).toFixed(0)+' KB)</div>';}).join('');
}

async function submitCitUpdate(caseId, casePhone){
  var noteEl=document.getElementById('cit-update-note');
  var filesInput=document.getElementById('cit-update-files');
  var msgEl=document.getElementById('cit-update-msg');
  var note=noteEl?noteEl.value.trim():'';
  var files=filesInput?Array.from(filesInput.files):[];
  function setMsg(txt,clr){if(msgEl){msgEl.style.color=clr||'var(--text3)';msgEl.textContent=txt;}}
  if(!note&&!files.length){setMsg('⚠️ أضف ملاحظة أو مستنداً','var(--danger)');return;}
  setMsg('⏳ جاري الإرسال…','var(--text3)');
  try{
    var res=await sb.from('cases').select('timeline,documents,notes').eq('id',caseId).single();
    if(res.error) throw res.error;
    var today=new Date().toISOString().slice(0,10);
    var tl=Array.from(res.data.timeline||[]);
    var docs=Array.from(res.data.documents||[]);
    var updates={};
    if(note){tl.push({a:'💬 تحديث من المواطن: '+note,by:'المواطن',d:today,cls:'citizen'});updates.timeline=tl;updates.notes=(res.data.notes?res.data.notes+'\n\n':'')+('['+today+' - المواطن]: '+note);}
    if(files.length){
      for(var i=0;i<files.length;i++){
        var f=files[i];var ext=f.name.split('.').pop().toLowerCase();
        var path=caseId+'/update_'+Date.now()+'_'+i+'.'+ext;
        var up=await sb.storage.from('case-documents').upload(path,f,{upsert:true});
        if(!up.error){var ur=sb.storage.from('case-documents').getPublicUrl(path);docs.push({name:f.name,url:ur.data.publicUrl,by:'citizen',date:today});}
      }
      tl.push({a:'📎 رُفع '+files.length+' مستند من المواطن',by:'المواطن',d:today,cls:'citizen'});
      updates.documents=docs;updates.timeline=tl;
    }
    var save=await sb.from('cases').update(updates).eq('id',caseId);
    if(save.error) throw save.error;
    setMsg('✅ تم إرسال تحديثك بنجاح!','var(--green2)');
    if(noteEl) noteEl.value='';
    if(filesInput) filesInput.value='';
    var listEl=document.getElementById('cit-update-file-list');
    if(listEl) listEl.innerHTML='';
  }catch(e){setMsg('خطأ: '+e.message,'var(--danger)');}
}

async function sendBrevoEmail(to, toName, subject, htmlContent){
  if(!to) return;
  try{
    var r=await fetch('https://api.brevo.com/v3/smtp/email',{
      method:'POST',headers:{'api-key':BKEY,'Content-Type':'application/json'},
      body:JSON.stringify({sender:{name:FROM_NAME,email:FROM_EMAIL},to:[{email:to,name:toName||to}],subject,htmlContent})
    });
    console.log('Brevo:',r.status);
  }catch(e){console.log('Brevo error:',e.message);}
}
